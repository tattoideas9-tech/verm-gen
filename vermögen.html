<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iFinance Intelligence Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #F5F5F7; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .tab-active { color: #0071E3; border-bottom: 2px solid #0071E3; }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">

    <nav class="sticky top-0 z-40 glass border-b border-gray-200 px-4 pt-12 pb-2">
        <div class="flex justify-between items-center mb-4 px-2 text-sm font-bold">
            <select id="month-select" onchange="updateUI()" class="bg-transparent text-blue-600 outline-none">
                </select>
            <div class="flex gap-4 text-[10px] uppercase tracking-widest text-gray-400">
                <button onclick="switchTab('wealth')" id="t-wealth" class="tab-active">Vermögen</button>
                <button onclick="switchTab('private')" id="t-private">Privat</button>
                <button onclick="switchTab('rent')" id="t-rent">Wohnung</button>
            </div>
        </div>
    </nav>

    <main class="p-6 max-w-2xl mx-auto space-y-6">
        
        <div class="card bg-gradient-to-br from-white to-gray-50 border border-white">
            <p id="label-top" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Saldo Monat</p>
            <h2 id="main-balance" class="text-4xl font-black tracking-tighter my-1">0,00 €</h2>
            <div class="mt-4 p-4 bg-blue-50 rounded-2xl border border-blue-100 flex justify-between items-center text-xs">
                <div>
                    <p class="font-bold text-blue-500 uppercase text-[9px]">Prognose 31. Dez</p>
                    <p id="forecast-value" class="text-lg font-bold text-blue-700">0,00 €</p>
                </div>
                <div class="text-right">
                    <p class="font-bold text-gray-400 uppercase text-[9px]">Sparquote</p>
                    <p id="savings-rate" class="font-bold text-gray-600">0%</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="h-44 w-full"><canvas id="mainChart"></canvas></div>
        </div>

        <section>
            <div class="flex justify-between items-center px-2 mb-4">
                <h3 id="list-title" class="font-bold text-xl">Bestand</h3>
                <button onclick="openModal()" class="w-10 h-10 bg-white shadow-sm rounded-full flex items-center justify-center text-blue-600 text-2xl font-light">+</button>
            </div>
            <div id="item-list" class="space-y-3"></div>
        </section>
    </main>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-end justify-center p-4">
        <div class="absolute inset-0 bg-black/20 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="glass w-full max-w-md rounded-[32px] p-8 relative z-10 shadow-2xl animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-2xl font-bold">Neuer Eintrag</h3>
                <button id="btn-delete" onclick="handleDelete()" class="hidden text-red-500 font-bold text-xs uppercase tracking-widest">Löschen</button>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="in-name" placeholder="Name" class="w-full p-4 rounded-2xl bg-gray-100 border-none outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input type="number" id="in-val" placeholder="Betrag in €" class="w-full p-4 rounded-2xl bg-gray-100 border-none outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                
                <div class="flex gap-2 p-1 bg-gray-100 rounded-2xl">
                    <button onclick="setMode('p')" id="m-p" class="flex-1 py-3 rounded-xl bg-green-500 text-white font-bold transition-all">Plus</button>
                    <button onclick="setMode('m')" id="m-m" class="flex-1 py-3 rounded-xl text-gray-400 font-bold transition-all">Minus</button>
                </div>

                <div id="repeat-container" class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl">
                    <span class="text-sm font-semibold text-gray-600">Monatlich wiederholen</span>
                    <input type="checkbox" id="in-repeat" class="w-6 h-6 rounded-full text-blue-600">
                </div>
            </div>
            
            <button onclick="save()" class="w-full mt-8 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all">Speichern</button>
        </div>
    </div>

    <script>
        let currentTab = 'wealth'; 
        let entryMode = 'p';
        let editingId = null; // Trackt, ob wir gerade bearbeiten
        
        let transactions = JSON.parse(localStorage.getItem('ifinance_v4')) || [];
        let chart;

        const months = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];
        const monthSelect = document.getElementById('month-select');
        const now = new Date();
        for(let i=0; i<12; i++) {
            let opt = document.createElement('option'); opt.value = i;
            opt.text = months[i] + " " + now.getFullYear();
            opt.selected = i === now.getMonth();
            monthSelect.appendChild(opt);
        }

        function switchTab(t) {
            currentTab = t;
            ['wealth', 'private', 'rent'].forEach(x => document.getElementById('t-'+x).classList.toggle('tab-active', t===x));
            document.getElementById('list-title').innerText = t === 'wealth' ? 'Bestand' : 'Einträge';
            updateUI();
        }

        function setMode(m) {
            entryMode = m;
            document.getElementById('m-p').className = m==='p' ? 'flex-1 py-3 rounded-xl bg-green-500 text-white font-bold' : 'flex-1 py-3 rounded-xl text-gray-400 font-bold';
            document.getElementById('m-m').className = m==='m' ? 'flex-1 py-3 rounded-xl bg-red-500 text-white font-bold' : 'flex-1 py-3 rounded-xl text-gray-400 font-bold';
        }

        function updateUI() {
            const selMonth = parseInt(monthSelect.value);
            const list = document.getElementById('item-list');
            list.innerHTML = '';
            
            let filtered = currentTab === 'wealth' 
                ? transactions.filter(t => t.tab === 'wealth')
                : transactions.filter(t => t.tab === currentTab && t.month === selMonth);

            let total = filtered.reduce((s, t) => s + t.val, 0);
            document.getElementById('main-balance').innerText = total.toLocaleString('de-DE', {style:'currency', currency:'EUR'});
            document.getElementById('main-balance').className = `text-4xl font-black tracking-tighter my-1 ${total >=0 ? 'text-green-600' : 'text-red-600'}`;

            filtered.forEach((t) => {
                list.innerHTML += `<div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm border border-gray-50 active:bg-gray-50 transition-all" onclick="editEntry('${t.id || transactions.indexOf(t)}')">
                    <div class="flex items-center gap-3">
                        <div class="w-1.5 h-6 rounded-full ${t.val >=0 ? 'bg-green-500' : 'bg-red-500'}"></div>
                        <span class="font-bold tracking-tight">${t.name} ${t.repeat ? ' ↻' : ''}</span>
                    </div>
                    <span class="font-bold text-lg ${t.val >=0 ? 'text-green-500' : 'text-red-500'}">${t.val.toLocaleString('de-DE')} €</span>
                </div>`;
            });

            renderChart(selMonth);
            calculateForecast(selMonth);
            localStorage.setItem('ifinance_v4', JSON.stringify(transactions));
        }

        function editEntry(id) {
            // Find entry by ID (new) or index (old data)
            let item = transactions.find(t => (t.id && t.id == id) || (!t.id && transactions.indexOf(t) == id));
            if(!item) return;

            editingId = item.id || transactions.indexOf(item);
            
            document.getElementById('modal-title').innerText = "Bearbeiten";
            document.getElementById('in-name').value = item.name;
            document.getElementById('in-val').value = Math.abs(item.val);
            document.getElementById('in-repeat').checked = item.repeat || false;
            document.getElementById('btn-delete').classList.remove('hidden');
            
            setMode(item.val >= 0 ? 'p' : 'm');
            openModal(true);
        }

        function save() {
            let n = document.getElementById('in-name').value;
            let v = parseFloat(document.getElementById('in-val').value);
            let rep = document.getElementById('in-repeat').checked;
            let m = parseInt(monthSelect.value);

            if(n && !isNaN(v)) {
                let val = (entryMode === 'm' ? -v : v);
                
                // Falls wir bearbeiten, löschen wir das alte (und ggf. seine Wiederholungen)
                if(editingId !== null) {
                    let oldItem = transactions.find(t => (t.id && t.id == editingId) || (!t.id && transactions.indexOf(t) == editingId));
                    if(oldItem && oldItem.repeat) {
                        transactions = transactions.filter(t => !(t.name === oldItem.name && t.tab === oldItem.tab && t.month >= oldItem.month));
                    } else {
                        transactions = transactions.filter(t => (t.id && t.id != editingId) || (!t.id && transactions.indexOf(t) != editingId));
                    }
                }

                // Neu anlegen (ggf. mit Wiederholung)
                const newId = Date.now();
                if(currentTab !== 'wealth' && rep) {
                    for(let i = m; i < 12; i++) {
                        transactions.push({ id: newId + i, name: n, val, tab: currentTab, month: i, repeat: true });
                    }
                } else {
                    transactions.push({ id: newId, name: n, val, tab: currentTab, month: m, repeat: false });
                }
                
                closeModal();
                updateUI();
            }
        }

        function handleDelete() {
            let item = transactions.find(t => (t.id && t.id == editingId) || (!t.id && transactions.indexOf(t) == editingId));
            if(!item) return;

            if(item.repeat && confirm('Dauerauftrag für alle Folgemonate löschen?')) {
                transactions = transactions.filter(t => !(t.name === item.name && t.tab === item.tab && t.month >= item.month));
            } else if(confirm('Löschen?')) {
                transactions = transactions.filter(t => (t.id && t.id != editingId) || (!t.id && transactions.indexOf(t) != editingId));
            }
            closeModal();
            updateUI();
        }

        function openModal(isEdit = false) {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('repeat-container').style.display = currentTab === 'wealth' ? 'none' : 'flex';
            if(!isEdit) {
                editingId = null;
                document.getElementById('modal-title').innerText = "Neuer Eintrag";
                document.getElementById('in-name').value = '';
                document.getElementById('in-val').value = '';
                document.getElementById('btn-delete').classList.add('hidden');
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        // Restliche Funktionen (Chart & Forecast) bleiben gleich
        function renderChart(selMonth) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            let dataArr, labels;
            if(currentTab === 'wealth') {
                let items = transactions.filter(t => t.tab === 'wealth');
                labels = items.map(i => i.name);
                dataArr = items.map(i => Math.abs(i.val));
            } else {
                let items = transactions.filter(t => t.tab === currentTab && t.month === selMonth);
                let inc = items.filter(i => i.val > 0).reduce((s,i) => s+i.val, 0);
                let exp = Math.abs(items.filter(i => i.val < 0).reduce((s,i) => s+i.val, 0));
                labels = ['Plus', 'Minus'];
                dataArr = [inc, exp];
            }
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels, datasets: [{ data: dataArr, backgroundColor: ['#0071E3', '#34C759', '#FF9500', '#AF52DE', '#FF3B30'], borderWidth: 0, borderRadius: 5 }] },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        function calculateForecast(selMonth) {
            let wealth = transactions.filter(t => t.tab === 'wealth').reduce((s,t) => s+t.val, 0);
            let future = 0;
            for(let i = selMonth; i < 12; i++) {
                future += transactions.filter(t => (t.tab === 'private' || t.tab === 'rent') && t.month === i).reduce((s,t) => s+t.val, 0);
            }
            document.getElementById('forecast-value').innerText = (wealth + future).toLocaleString('de-DE', {style:'currency', currency:'EUR'});
            let inc = transactions.filter(t => (t.tab === 'private' || t.tab === 'rent') && t.month === selMonth && t.val > 0).reduce((s,t) => s+t.val, 0);
            let exp = Math.abs(transactions.filter(t => (t.tab === 'private' || t.tab === 'rent') && t.month === selMonth && t.val < 0).reduce((s,t) => s+t.val, 0));
            document.getElementById('savings-rate').innerText = inc > 0 ? ((inc - exp) / inc * 100).toFixed(0) + "%" : "0%";
        }

        updateUI();
    </script>
</body>
</html>
